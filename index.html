<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>restart</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <div id="os-root" aria-label="restart desktop shell">
      <div id="desktop-layer">
        <div id="desktop-grid" class="desktop-grid" role="list"></div>
        <div id="window-layer" class="window-layer" aria-live="polite"></div>
      </div>

      <aside id="start-menu" class="start-menu hidden" aria-hidden="true"></aside>

      <footer id="taskbar" class="taskbar">
        <button id="start-button" class="taskbar-button" aria-label="Open start menu">
          <span class="start-glyph">◼</span>
          <span>restart</span>
        </button>
        <div id="taskbar-apps" class="taskbar-apps" aria-label="Running applications"></div>
        <div id="system-tray" class="system-tray">
          <span id="tray-clock">--:--</span>
        </div>
      </footer>
    </div>

    <noscript>This system requires JavaScript to run.</noscript>
    <script type="module" src="./main.js"></script>
  </body>
</html>
