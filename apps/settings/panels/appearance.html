<section class="settings-panel-block">
  <h3>Appearance</h3>
  <label>Theme
    <select id="theme-select">
      <option value="theme-dark-glass">Dark Glass</option>
      <option value="theme-light-glass">Light Glass</option>
      <option value="theme-monochrome">Monochrome</option>
    </select>
  </label>

  <label>Desktop Scale
    <input id="scale-range" type="range" min="0.8" max="1.2" step="0.05" value="1" />
  </label>

  <label>
    <input id="dock-toggle" type="checkbox" />
    Enable Mac-style dock taskbar
  </label>
</section>
